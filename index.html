<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Image</title>
<style>
body{font-family:Arial;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#222;padding:20px;border-radius:12px;text-align:center;max-width:420px;width:90%}
input,button{padding:10px;width:100%;margin-top:10px}
img{display:none;max-width:100%;margin-top:15px;border-radius:8px}
</style>
</head>
<body>
<div class="box">
<h2>Protected Page</h2>
<p>Enter password to view the image.</p>
<input id="pw" type="password" placeholder="Password">
<button onclick="check()">Open</button>
<div id="msg"></div>
<img id="photo" src="FB_IMG_1783170543736.jpg" alt="Image">
</div>
<script>
function check(){
 if(document.getElementById('pw').value==='meghla'){
   document.getElementById('photo').style.display='block';
   document.getElementById('msg').innerHTML='';
 } else {
   document.getElementById('msg').innerHTML='<p style="color:#ff6666">Wrong password!</p>';
 }
}
</script>
</body>
</html>
